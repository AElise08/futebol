<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Controle — Fuga do Tribunal</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; }
  body {
    font-family: 'Archivo', system-ui, sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #2a2014 0%, #0f0c08 75%);
    color: #f2f5f0;
    display: flex; flex-direction: column;
  }

  #topo {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: #9fb0a4;
  }
  #quem { font-weight: 800; letter-spacing: 0.08em; font-size: 14px; }
  #status { display: flex; align-items: center; gap: 7px; }
  #status .dot { width: 8px; height: 8px; border-radius: 50%; background: #e0a13a; }
  #status.on .dot { background: #52d273; box-shadow: 0 0 8px #52d273; }
  #status.err .dot { background: #d8452e; }

  #area { flex: 1; display: flex; position: relative; }

  #zona-stick { flex: 1.2; position: relative; }
  #dica-stick {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 150px; height: 150px; border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.16);
    display: grid; place-items: center; text-align: center;
    color: rgba(255,255,255,0.3); font-size: 11px;
    font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    pointer-events: none; line-height: 1.6;
    transition: opacity 0.3s ease;
  }
  #zona-stick.usando #dica-stick { opacity: 0; }

  #zona-botoes { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; position: relative; }
  #b-poder {
    width: 106px; height: 106px; border-radius: 50%;
    border: none; font-family: inherit; font-weight: 800; font-size: 13px;
    letter-spacing: 0.06em; text-transform: uppercase; color: #131007;
    background: #caa64a; display: grid; place-items: center;
    transition: transform 0.07s ease, filter 0.2s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
  }
  #b-poder:active { transform: scale(0.92); }
  #b-poder.cd { filter: grayscale(0.75) brightness(0.55); }
  #b-poder .anel-cd {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(rgba(0,0,0,0.55) var(--cd, 0%), transparent 0);
    pointer-events: none;
  }
  #b-esquiva {
    width: 150px; height: 150px; border-radius: 50%;
    border: none; font-family: inherit; font-weight: 800; font-size: 17px;
    letter-spacing: 0.06em; text-transform: uppercase; color: #fff;
    background: #7d92ff; display: grid; place-items: center;
    transition: transform 0.07s ease, filter 0.2s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
  }
  #b-esquiva:active { transform: scale(0.92); }
  #b-esquiva.cd { filter: grayscale(0.75) brightness(0.55); }
  #b-esquiva .anel-cd {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(rgba(0,0,0,0.55) var(--cd, 0%), transparent 0);
    pointer-events: none;
  }

  #ind-sprint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    padding: 8px 26px; border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.18);
    font-weight: 800; font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(255,255,255,0.35);
    transition: all 0.15s ease; pointer-events: none;
  }
  #ind-sprint.ativo {
    background: #52d273; border-color: #52d273; color: #08150c;
    box-shadow: 0 0 18px rgba(82,210,115,0.5);
  }

  #mm-wrap {
    position: fixed; top: 46px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.16);
    border-radius: 10px; padding: 4px; pointer-events: none; z-index: 5;
  }
  #mm-wrap canvas { display: block; border-radius: 6px; }

  #girar {
    position: fixed; inset: 0; z-index: 50;
    background: #0f0c08; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 30px;
  }
  #girar span { font-size: 44px; }
  #girar p { color: #9fb0a4; font-size: 15px; max-width: 260px; line-height: 1.5; }
  @media (orientation: portrait) { #girar { display: flex; } }
</style>
</head>
<body>
<div id="topo">
  <span>Fuga do Tribunal</span>
  <span id="quem"></span>
  <span id="status"><span class="dot"></span><span id="status-txt">Conectando…</span></span>
</div>

<div id="area">
  <div id="zona-stick"><div id="dica-stick">Toque e arraste<br>· fundo = sprint ·</div></div>
  <div id="zona-botoes">
    <button id="b-poder"><span class="anel-cd"></span><span id="poder-label">Poder</span></button>
    <button id="b-esquiva"><span class="anel-cd"></span>Esquiva</button>
  </div>
</div>

<div id="ind-sprint">Sprint</div>


<div id="mm-wrap"><canvas id="mm" width="190" height="56"></canvas></div>


<div id="girar">
  <span>📱↻</span>
  <p>Gire o celular para o modo paisagem para jogar.</p>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
<script>
  const peerAlvo = new URLSearchParams(location.search).get('peer');
  const status = document.getElementById('status');
  const statusTxt = document.getElementById('status-txt');
  const indSprint = document.getElementById('ind-sprint');
  const bEsquiva = document.getElementById('b-esquiva');
  const estado = { x: 0, y: 0, sp: false };
  let conn = null, enviador = null, tentativa = 0, cheio = false;
  let meuSlot = -1, minhaCor = '#52d273', mapa = [], mmDados = null;
  const mmCv = document.getElementById('mm');
  const mmG = mmCv.getContext('2d');
  function desenhaMM() {
    const w = 190, h = 56, pad = 3;
    const X = x => pad + ((Math.max(-75, Math.min(75, x)) + 75) / 150) * (w - pad * 2);
    const Z = z => pad + ((Math.max(-20, Math.min(20, z)) + 20) / 40) * (h - pad * 2);
    mmG.clearRect(0, 0, w, h);
    mmG.fillStyle = 'rgba(107,82,50,0.55)';
    mmG.fillRect(pad, pad, w - pad * 2, h - pad * 2);
    mmG.fillStyle = 'rgba(255,255,255,0.3)';
    for (const [x, z, hx, hz] of mapa) {
      mmG.fillRect(X(x - hx), Z(z - hz), Math.max(1.2, X(x + hx) - X(x - hx)), Math.max(1.2, Z(z + hz) - Z(z - hz)));
    }
    if (!mmDados) return;
    mmG.fillStyle = 'rgba(201,174,107,0.95)';
    for (const [x, z, hx, hz] of (mmDados.b || [])) {
      mmG.fillRect(X(x - hx), Z(z - hz), Math.max(1.5, X(x + hx) - X(x - hx)), Math.max(1.5, Z(z + hz) - Z(z - hz)));
    }
    for (const [x, z, f] of mmDados.o) {
      mmG.beginPath(); mmG.arc(X(x), Z(z), 1.8, 0, Math.PI * 2);
      mmG.fillStyle = f === 1 ? '#c9a1ff' : f === 2 ? '#6fbf5f' : '#7fb2ff';
      mmG.fill();
    }
    for (const [i, pj] of mmDados.j.entries()) {
      if (!pj) continue;   // rival invisível não aparece
      const [x, z] = pj;
      const sou = i === meuSlot;
      mmG.beginPath(); mmG.arc(X(x), Z(z), sou ? 3 : 2.2, 0, Math.PI * 2);
      mmG.fillStyle = sou ? minhaCor : 'rgba(255,255,255,0.85)';
      mmG.fill();
      if (sou) {
        mmG.beginPath(); mmG.arc(X(x), Z(z), 4.6, 0, Math.PI * 2);
        mmG.strokeStyle = minhaCor; mmG.lineWidth = 1.2; mmG.stroke();
      }
    }
  }

  function setStatus(cls, txt) {
    status.classList.remove('on', 'err');
    if (cls) status.classList.add(cls);
    statusTxt.textContent = txt;
  }

  // ---------- conexão com o jogo (com reconexão automática) ----------
  let peer = null;
  if (!peerAlvo) {
    setStatus('err', 'Link sem código do jogo');
  } else {
    peer = new Peer();
    peer.on('open', conectar);
    peer.on('error', e => {
      if (cheio) return;
      // ex.: jogo fechou / peer indisponível — tenta de novo em alguns segundos
      setStatus('err', 'Jogo fora do ar? Tentando…');
      setTimeout(conectar, 2500);
    });
  }

  function conectar() {
    if (cheio || !peer || peer.destroyed) return;
    if (conn?.open) return;
    setStatus('', tentativa ? `Reconectando… (${tentativa})` : 'Conectando…');
    conn = peer.connect(peerAlvo, { reliable: false });
    conn.on('open', () => {
      tentativa = 0;
      setStatus('on', 'Conectado');
      vibra([60, 40, 60]);
      clearInterval(enviador);
      enviador = setInterval(() => {
        if (conn.open) conn.send({ t: 'st', x: estado.x, y: estado.y, sp: estado.sp });
      }, 33); // ~30Hz
    });
    conn.on('data', d => {
      if (d.t === 'v') vibra(d.p);
      else if (d.t === 'quem') {
        const quem = document.getElementById('quem');
        quem.textContent = 'Você é ' + d.nome.toUpperCase();
        quem.style.color = d.cor;
        bEsquiva.style.background = d.cor;
        meuSlot = d.slot ?? (d.nome === 'Jessica' ? 0 : 1);
        minhaCor = d.cor;
        if (d.poder) document.getElementById('poder-label').textContent = d.poder;
        vibra([50, 40, 50]);
      }
      else if (d.t === 'mapa') { mapa = d.m; desenhaMM(); }
      else if (d.t === 'mm') { mmDados = d; desenhaMM(); }
      else if (d.t === 'cheio') {
        cheio = true;
        clearInterval(enviador);
        setStatus('err', 'Jogo cheio: 2 controles já conectados');
      }
    });
    const caiu = () => {
      clearInterval(enviador);
      if (cheio) return;
      tentativa++;
      setStatus('err', 'Caiu — reconectando…');
      setTimeout(conectar, Math.min(5000, 800 + tentativa * 700));
    };
    conn.on('close', caiu);
    conn.on('error', caiu);
  }

  function vibra(p) { if (navigator.vibrate) navigator.vibrate(p); }
  function botao(nome) {
    if (conn?.open) conn.send({ t: 'b', b: nome });
    vibra(25);
  }

  // ---------- joystick dinâmico (nasce onde o dedo toca) ----------
  const zonaStick = document.getElementById('zona-stick');
  const stick = nipplejs.create({
    zone: zonaStick,
    mode: 'dynamic',
    size: 150,
    color: '#e8d9a8',
    restOpacity: 0.4,
  });
  stick.on('start', () => zonaStick.classList.add('usando'));
  stick.on('move', (e, dados) => {
    if (!dados.vector) return;
    estado.x = dados.vector.x;
    estado.y = -dados.vector.y; // eixo do jogo: +z é "pra baixo" na tela
    // sprint automático: joystick no fim do curso (com histerese pra não piscar)
    const mag = Math.hypot(dados.vector.x, dados.vector.y);
    if (!estado.sp && mag > 0.9) ligaSprint(true);
    else if (estado.sp && mag < 0.7) ligaSprint(false);
  });
  stick.on('end', () => {
    estado.x = 0; estado.y = 0;
    ligaSprint(false);
    zonaStick.classList.remove('usando');
  });
  function ligaSprint(v) {
    if (estado.sp === v) return;
    estado.sp = v;
    indSprint.classList.toggle('ativo', v);
    if (v) vibra(15);
  }

  // ---------- botões com anel de recarga ----------
  function preparaBotaoCd(btn, nome, durCd) {
    let ate = 0, anim = null;
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      botao(nome);
      const agora = performance.now();
      if (agora >= ate) {
        ate = agora + durCd;
        btn.classList.add('cd');
        cancelAnimationFrame(anim);
        (function gira() {
          const falta = ate - performance.now();
          if (falta <= 0) {
            btn.classList.remove('cd');
            btn.style.setProperty('--cd', '0%');
            vibra(15);
            return;
          }
          btn.style.setProperty('--cd', (falta / durCd * 100) + '%');
          anim = requestAnimationFrame(gira);
        })();
      }
    });
  }
  preparaBotaoCd(bEsquiva, 'esquiva', 2200);
  preparaBotaoCd(document.getElementById('b-poder'), 'poder', 35000); // 10s de poder + 25s de recarga

  // ---------- manter a tela acesa + fullscreen ----------
  let wakeLock = null;
  async function pegarWakeLock() {
    try { wakeLock = await navigator.wakeLock?.request('screen'); } catch (e) { /* sem suporte */ }
  }
  pegarWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { pegarWakeLock(); conectar(); }
  });
  document.body.addEventListener('touchstart', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(() => {});
  }, { once: true });
</script>
</body>
</html>
