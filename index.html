<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futebol 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d1410;
    --glass: rgba(10, 16, 12, 0.82);
    --line: rgba(255, 255, 255, 0.14);
    --txt: #f2f5f0;
    --txt-dim: #9fb0a4;
    --azul: #2f7de1;
    --verde: #d8452e;
    --ok: #52d273;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); }
  body { font-family: 'Archivo', system-ui, sans-serif; color: var(--txt); }
  #cena { position: fixed; inset: 0; }

  /* ============ HUD (limpo, estilo transmissão) ============ */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  #placar {
    position: absolute; top: 20px; left: 20px;
    display: flex; align-items: stretch;
    background: var(--glass); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 10px;
    overflow: hidden;
    font-variant-numeric: tabular-nums;
  }
  #placar .time {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; font-weight: 700; font-size: 15px;
    letter-spacing: 0.06em; font-stretch: 90%;
  }
  #placar .chip { width: 4px; height: 18px; border-radius: 2px; }
  #placar .time.azul .chip { background: var(--azul); }
  #placar .time.verm .chip { background: var(--verde); }
  #placar .gols {
    padding: 8px 12px; font-weight: 800; font-size: 16px;
    background: rgba(255, 255, 255, 0.07);
    display: flex; align-items: center; gap: 8px;
  }
  #placar .relogio {
    padding: 8px 14px; font-weight: 600; font-size: 14px;
    color: var(--txt-dim); display: flex; align-items: center;
    border-left: 1px solid var(--line);
  }

  #jogador-info {
    position: absolute; bottom: 24px; left: 20px;
    background: var(--glass); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; min-width: 170px;
  }
  #jogador-nome { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 7px; }
  #stamina-trilho { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.12); overflow: hidden; }
  #stamina-barra { height: 100%; width: 100%; border-radius: 3px; background: var(--ok); transition: width 0.15s linear; }

  #minimapa {
    position: fixed; z-index: 15;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--glass); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 7px 7px 5px; box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }
  #minimapa canvas { display: block; border-radius: 6px; }
  #minimapa .legenda {
    display: flex; justify-content: center; gap: 12px; margin-top: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--txt-dim);
  }
  #minimapa .legenda span { display: flex; align-items: center; gap: 4px; }
  #minimapa .legenda i { width: 8px; height: 8px; border-radius: 50%; }

  #conexao {
    position: absolute; top: 20px; right: 20px;
    display: flex; align-items: center; gap: 8px;
    background: var(--glass); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 14px; font-size: 12px; font-weight: 600;
    color: var(--txt-dim); letter-spacing: 0.04em;
  }
  #conexao .dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7a70; }
  #conexao.on .dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  #conexao.on { color: var(--txt); }

  #aviso {
    position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
    font-size: clamp(48px, 9vw, 110px); font-weight: 800; font-stretch: 115%;
    letter-spacing: 0.02em; text-transform: uppercase;
    opacity: 0; pointer-events: none;
    text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #aviso.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* ============ Overlay inicial ============ */
  #inicio {
    position: fixed; inset: 0; z-index: 20;
    background: radial-gradient(ellipse at 50% 30%, #14261a 0%, #0a120d 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px; text-align: center; padding: 24px;
    transition: opacity 0.5s ease;
  }
  #inicio.esconde { opacity: 0; pointer-events: none; }
  #inicio h1 {
    font-size: clamp(40px, 7vw, 72px); font-weight: 800; font-stretch: 120%;
    text-transform: uppercase; letter-spacing: 0.03em; line-height: 1;
  }
  #inicio h1 span { color: var(--ok); }
  #inicio p { color: var(--txt-dim); font-size: 15px; max-width: 420px; line-height: 1.6; }

  #qr-card {
    background: #fff; border-radius: 16px; padding: 18px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #qr-alvo { width: 196px; height: 196px; display: grid; place-items: center; }
  #qr-alvo img, #qr-alvo canvas { width: 196px !important; height: 196px !important; }
  #qr-status { color: #333; font-size: 12px; font-weight: 600; }
  #qr-status.on { color: #1a9d4b; }

  #btn-jogar {
    pointer-events: auto; cursor: pointer;
    background: var(--ok); color: #08150c; border: none;
    font-family: inherit; font-weight: 800; font-size: 17px;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 15px 46px; border-radius: 999px;
    transition: transform 0.15s ease;
  }
  #btn-jogar:hover { transform: scale(1.04); }
  #teclas { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; color: var(--txt-dim); font-size: 13px; }
  #teclas b { color: var(--txt); background: rgba(255,255,255,0.1); border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; font-weight: 700; margin-right: 5px; }

  #fim {
    position: fixed; inset: 0; z-index: 30; display: none;
    background: rgba(8, 14, 10, 0.9); backdrop-filter: blur(6px);
    flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  #fim.show { display: flex; }
  #fim h2 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; font-stretch: 115%; text-transform: uppercase; }
  #fim .resultado { font-size: 22px; color: var(--txt-dim); font-variant-numeric: tabular-nums; }
  #fim button {
    cursor: pointer; background: transparent; color: var(--txt);
    border: 1px solid var(--line); border-radius: 999px;
    font-family: inherit; font-weight: 700; font-size: 15px;
    padding: 13px 38px; letter-spacing: 0.05em; text-transform: uppercase;
  }
  #fim button:hover { border-color: var(--ok); color: var(--ok); }
</style>
</head>
<body>
<div id="cena"></div>

<div id="hud">
  <div id="placar">
    <div class="time azul"><span class="chip"></span>AZU</div>
    <div class="gols"><span id="gol-azul">0</span><span style="opacity:.4">–</span><span id="gol-verm">0</span></div>
    <div class="time verm"><span class="chip"></span>VER</div>
    <div class="relogio" id="relogio">05:00</div>
  </div>

  <div id="conexao"><span class="dot"></span><span id="conexao-txt">Sem controle</span></div>

  <div id="jogador-info">
    <div id="jogador-nome">—</div>
    <div id="stamina-trilho"><div id="stamina-barra"></div></div>
  </div>

  <div id="aviso"></div>
</div>

<div id="minimapa">
  <canvas id="mm-canvas"></canvas>
  <div class="legenda">
    <span><i style="background:#2f7de1"></i>Azul</span>
    <span><i style="background:#d8452e"></i>Vermelho</span>
    <span><i style="background:#52d273;border-radius:2px"></i>Você</span>
  </div>
</div>

<div id="inicio">
  <h1>Futebol <span>3D</span></h1>
  <p>Escaneie o QR Code com o celular para usá-lo como controle, ou jogue direto no teclado.</p>
  <div id="qr-card">
    <div id="qr-alvo"></div>
    <div id="qr-status">Gerando código…</div>
  </div>
  <div id="teclas">
    <span><b>WASD</b>mover</span>
    <span><b>Espaço</b>sprint</span>
    <span><b>Z</b>passe</span>
    <span><b>C</b>chute</span>
    <span><b>V</b>desarme</span>
    <span><b>Shift</b>trocar</span>
  </div>
  <button id="btn-jogar">Começar partida</button>
</div>

<div id="fim">
  <h2 id="fim-titulo">Fim de jogo</h2>
  <div class="resultado" id="fim-resultado"></div>
  <button id="btn-denovo">Jogar novamente</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
<script type="module" src="js/game.js"></script>
</body>
</html>
